# DocsPI Multi-Platform Build & Release Pipeline
# Triggers: push to main, PR, tag v*
# Builds: Windows (x86_64), macOS (x86_64 + arm64), Linux (x86_64 + arm64),
#         Android (ARM64), iOS/iPadOS (ARM64)

name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        type: choice
        options: [all, windows, macos, linux, android, ios]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

jobs:
  # ────────────────────────────────────────────────────────
  # Frontend build - shared across all targets
  # ────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    outputs:
      frontend-dir: dist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx vite build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────
  # Go Divert Engine - cross-compile for all platforms
  # ────────────────────────────────────────────────────────
  divert-engine:
    name: Build Divert Engine
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [windows, linux, darwin, android]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64  # Apple Silicon only for macOS
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.22"

      - name: Build divert binary
        working-directory: docspi-divert
        run: |
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          mkdir -p ../src-tauri/binaries
          go build -ldflags="-s -w" -o "../src-tauri/binaries/docspi-divert-${GOOS}-${GOARCH}${ext}" .

      - uses: actions/upload-artifact@v4
        with:
          name: divert-${{ matrix.goos }}-${{ matrix.goarch }}
          path: src-tauri/binaries/docspi-divert-*
          retention-days: 1

  # ────────────────────────────────────────────────────────
  # Windows Desktop Build (x86_64) — MSI/NSIS
  # ────────────────────────────────────────────────────────
  windows:
    name: Windows (x86_64)
    needs: [frontend, divert-engine]
    runs-on: windows-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: divert-windows-amd64
          path: src-tauri/binaries/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows installer
        run: |
          cd src-tauri
          npm run tauri build -- --bundles msi

      - uses: actions/upload-artifact@v4
        with:
          name: DocsPI-Windows-x86_64
          path: src-tauri/target/release/bundle/msi/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # macOS Desktop Build (ARM64) — DMG
  # ────────────────────────────────────────────────────────
  macos:
    name: macOS (ARM64)
    needs: [frontend, divert-engine]
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: divert-darwin-arm64
          path: src-tauri/binaries/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build macOS DMG
        run: |
          cd src-tauri
          npm run tauri build -- --bundles dmg

      - uses: actions/upload-artifact@v4
        with:
          name: DocsPI-macOS-ARM64
          path: src-tauri/target/release/bundle/dmg/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # Linux Desktop Build (x86_64) — AppImage
  # ────────────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    needs: [frontend, divert-engine]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: divert-linux-amd64
          path: src-tauri/binaries/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build Linux AppImage
        run: |
          cd src-tauri
          npm run tauri build -- --bundles appimage

      - uses: actions/upload-artifact@v4
        with:
          name: DocsPI-Linux-x86_64
          path: src-tauri/target/release/bundle/appimage/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # Android Build (ARM64 APK/AAB)
  # ────────────────────────────────────────────────────────
  android:
    name: Android (ARM64)
    needs: [frontend]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: "26.1.10909125"

      - name: Build Android APK
        run: |
          cd src-tauri
          npm run tauri android init
          npm run tauri android build --target aarch64-linux-android

      - uses: actions/upload-artifact@v4
        with:
          name: DocsPI-Android-ARM64
          path: src-tauri/gen/android/app/build/outputs/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # iOS / iPadOS Build (ARM64 IPA) — macOS runner only
  # ────────────────────────────────────────────────────────
  ios:
    name: iOS (ARM64)
    needs: [frontend]
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' || github.event_name != 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Build iOS IPA
        run: |
          cd src-tauri
          npm run tauri ios init
          npm run tauri ios build --target aarch64-apple-ios

      - uses: actions/upload-artifact@v4
        with:
          name: DocsPI-iOS-ARM64
          path: src-tauri/gen/ios/build/
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # Release — create GitHub Release with all artifacts
  # ────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [windows, macos, linux, android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: DocsPI-*
          merge-multiple: true

      - name: Generate release notes
        run: |
          echo "# DocsPI ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "## Downloads" >> release-notes.md
          ls -la *.dmg *.AppImage *.exe *.msi *.apk *.aab *.ipa 2>/dev/null | \
            awk '{print "- "$NF}' >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            *.dmg
            *.AppImage
            *.exe
            *.msi
            *.apk
            *.aab
            *.ipa

